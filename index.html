<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首頁版本選擇｜青溪國小創造力資優班</title>
  <meta name="description" content="青溪國小創造力資優班首頁 A、B、C 三個版本選擇。">
  <style>
    :root {
      --bg: #f6efe4;
      --ink: #18232d;
      --muted: #66706e;
      --paper: #fffaf1;
      --shadow: 0 24px 70px rgba(24, 24, 24, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(213, 154, 61, 0.2), transparent 28%),
        radial-gradient(circle at bottom right, rgba(36, 70, 60, 0.15), transparent 26%),
        linear-gradient(180deg, #fbf4e8, var(--bg));
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      line-height: 1.7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #9c6d25;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      line-height: 1.08;
    }

    .header p:last-child {
      max-width: 380px;
      margin: 8px 0 0;
      color: var(--muted);
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .option-card {
      position: relative;
      min-height: 620px;
      overflow: hidden;
      border-radius: 34px;
      background: #222;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .option-card img {
      width: 100%;
      height: 100%;
      min-height: 620px;
      object-fit: cover;
      display: block;
      transform: scale(1.02);
      transition: transform 0.35s ease;
    }

    .option-card:hover img {
      transform: scale(1.07);
    }

    .option-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .option-card.a::after {
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.08), rgba(20, 36, 55, 0.86));
    }

    .option-card.b::after {
      background: linear-gradient(180deg, rgba(255, 202, 129, 0.1), rgba(122, 62, 28, 0.74));
    }

    .option-card.c::after {
      background:
        linear-gradient(180deg, rgba(10, 12, 18, 0.12), rgba(5, 8, 12, 0.88)),
        linear-gradient(130deg, rgba(242, 110, 141, 0.22), rgba(105, 210, 208, 0.16));
    }

    .option-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px;
      color: white;
    }

    .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.32);
      backdrop-filter: blur(8px);
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .option-content h2 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 3vw, 2.8rem);
      line-height: 1.08;
    }

    .option-content p {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, 0.88);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 150px;
      padding: 12px 18px;
      border-radius: 999px;
      background: white;
      color: #17202a;
      font-weight: 700;
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 960px) {
      .header,
      .options {
        grid-template-columns: 1fr;
      }

      .header {
        display: block;
      }

      .option-card,
      .option-card img {
        min-height: 480px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <p class="eyebrow">Homepage Options</p>
        <h1>首頁版本選擇</h1>
      </div>
      <p>請點選 A、B、C 其中一個版本查看完整首頁。</p>
    </header>

    <section class="options">
      <a class="option-card a" href="index-visual-a.html">
        <img src="assets/img-grade6.jpg" alt="版本 A 正式校務型">
        <div class="option-content">
          <span class="letter">A</span>
          <div>
            <h2>正式校務型</h2>
            <p>穩重、端正，適合學校官網形象。</p>
            <span class="button">查看 A</span>
          </div>
        </div>
      </a>

      <a class="option-card b" href="index-visual-b.html">
        <img src="assets/img-people-making.jpg" alt="版本 B 溫暖課堂型">
        <div class="option-content">
          <span class="letter">B</span>
          <div>
            <h2>溫暖課堂型</h2>
            <p>親切、有現場感，適合家長瀏覽。</p>
            <span class="button">查看 B</span>
          </div>
        </div>
      </a>

      <a class="option-card c" href="index-visual-c.html">
        <img src="assets/img-mentor.jpg" alt="版本 C 成果展海報型">
        <div class="option-content">
          <span class="letter">C</span>
          <div>
            <h2>成果展海報型</h2>
            <p>亮眼、有主題感，適合成果展宣傳。</p>
            <span class="button">查看 C</span>
          </div>
        </div>
      </a>
    </section>

    <p class="footer">青溪國小創造力資優班首頁提案。確認版本後，可再將選定版本設為正式首頁。</p>
  </main>
</body>
</html>
