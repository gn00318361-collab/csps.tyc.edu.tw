  <main class="inner-page">
    <section class="page-hero">
      <p class="eyebrow">Curriculum</p>
      <h1>114學年度課程架構</h1>
    </section>

    <section class="section soft curriculum-card">
      <div class="section-head">
        <p class="eyebrow">Creativity Curriculum</p>
        <h2>創造力資優班課綱</h2>
      </div>
      <div class="photo-grid photo-grid-single">
        <figure class="photo-card large diagram-card diagram-focus">
          <img class="diagram-image" src="assets/curriculum-structure-114.jpg" alt="114學年度創造力資優班課程架構圖">
        </figure>
      </div>
    </section>

    <section class="section soft curriculum-card">
      <div class="section-head section-head-centered">
        <h2>桃園市桃園區青溪國小114學年度資優巡迴班課綱</h2>
      </div>
      <div class="curriculum-map-layout">
        <div class="map-stair">
          <div class="map-step-spacer"></div>
          <div class="map-step step-6">6年級</div>
          <div class="map-step step-5">5年級</div>
          <div class="map-step step-4">4年級</div>
          <div class="map-step step-3">3年級</div>
        </div>

        <div class="map-table-board">
          <div class="scan-board">
            <section class="scan-column">
              <div class="scan-section-title scan-section-title-left">特需領域</div>
              <div class="scan-grid special-scan-grid">
                <div class="scan-cell head blank-cell"></div>
                <div class="scan-cell head">情意發展</div>
                <div class="scan-cell head">獨立研究</div>
                <div class="scan-cell grade-cell">6</div>
                <div class="scan-cell">生涯發展</div>
                <div class="scan-cell">獨立研究</div>
                <div class="scan-cell grade-cell">5</div>
                <div class="scan-cell">關懷行動</div>
                <div class="scan-cell">專題探究</div>
                <div class="scan-cell grade-cell">4</div>
                <div class="scan-cell">情緒導航</div>
                <div class="scan-cell">研究方法</div>
                <div class="scan-cell grade-cell">3</div>
                <div class="scan-cell">自我探索</div>
                <div class="scan-cell">資料搜尋</div>
              </div>
            </section>

            <section class="scan-column">
              <div class="scan-section-title scan-section-title-left">專長課程</div>
              <div class="scan-grid subject-scan-grid">
                <div class="scan-cell head blank-cell"></div>
                <div class="scan-cell head">語文</div>
                <div class="scan-cell head">數學</div>
                <div class="scan-cell head">自然</div>
                <div class="scan-cell head">科創</div>
                <div class="scan-cell level-cell tall-row-cell">高</div>
                <div class="scan-cell tall-row-cell">故事劇場</div>
                <div class="scan-cell tall-row-cell">密室玩家</div>
                <div class="scan-cell tall-row-cell">科學玩具</div>
                <div class="scan-cell tall-row-cell">創意積木</div>
                <div class="scan-cell level-cell middle-level-cell tall-row-cell">中</div>
                <div class="scan-cell tall-row-cell">肢體符號<br>廣播達人</div>
                <div class="scan-cell tall-row-cell">數謎設計</div>
                <div class="scan-cell tall-row-cell">生活實驗</div>
                <div class="scan-cell tall-row-cell">連動機關</div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>
