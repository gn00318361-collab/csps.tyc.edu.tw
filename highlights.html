<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動剪影｜青溪國小創造力資優班</title>
  <link rel="stylesheet" href="styles.css?v=20260423-font">
</head>
<body>
  <header class="site-header">
    <div class="brand-block">
      <p class="eyebrow">Qing Xi Elementary School</p>
      <a class="brand" href="index.html">青溪國小創造力資優班</a>
    </div>
    <nav class="site-nav">
      <a href="index.html">首頁</a>
      <a href="about.html">班級介紹</a>
      <a href="curriculum.html">課程架構</a>
      <a class="active" href="highlights.html">活動剪影</a>
      <a href="notices.html">公告資訊</a>
      <a href="contact.html">聯絡我們</a>
    </nav>
  </header>

  <main class="inner-page">
    <section class="page-hero">
      <p class="eyebrow">Highlights</p>
      <h1>學習現場剪影</h1>
    </section>

    <section class="section soft">
      <div class="section-head">
        <p class="eyebrow">活動照片</p>
        <h2>依 114學年度整理。</h2>
      </div>
      <div class="grade-section">
        <div class="grade-head">
          <h3>中年級課程</h3>
        </div>
        <div class="photo-grid">
          <figure class="photo-card">
            <img src="assets/structure-class-114.jpg" alt="三年級學生合作進行結構組裝活動">
            <figcaption>結構組裝課程</figcaption>
          </figure>
          <figure class="photo-card">
            <img
              class="media-card-image"
              src="assets/img-media-random-1.jpg"
              alt="三年級學生進行媒材應用創作活動"
              data-random-group="media"
            >
            <figcaption>媒材應用課程</figcaption>
          </figure>
          <figure class="photo-card">
            <img
              src="assets/img-animation-random-1.jpg"
              alt="三年級學生進行動畫製作課程"
              data-random-group="animation"
            >
            <figcaption>動畫製作課程</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="assets/img-wirecraft.jpg" alt="三年級媒材應用課程中的創作活動">
            <figcaption>媒材細部操作與創作過程</figcaption>
          </figure>
        </div>
      </div>

      <div class="grade-section">
        <div class="grade-head">
          <h3>中年級進階課程</h3>
        </div>
        <div class="photo-grid">
          <figure class="photo-card large">
            <img src="assets/img-grade4-camera.jpg" alt="四年級動畫製作課程操作相機">
            <figcaption>動畫製作課程：相機操作與畫面構圖</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="assets/img-grade4-tripod.jpg" alt="四年級學生調整腳架拍攝">
            <figcaption>學習腳架調整與拍攝準備</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="assets/img-grade4-portrait.jpg" alt="四年級動畫製作課程學生學習紀錄">
            <figcaption>影像觀察與角色表現練習</figcaption>
          </figure>
        </div>
      </div>

      <div class="grade-section">
        <div class="grade-head">
          <h3>高年級課程</h3>
        </div>
        <div class="photo-grid">
          <figure class="photo-card large">
            <img src="assets/img-people-making.jpg" alt="五年級技能課人偶製作活動">
            <figcaption>技能課程：人偶製作</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="assets/img-painting-dolls.jpg" alt="高年級學生彩繪人偶作品">
            <figcaption>人偶彩繪與作品完成階段</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="assets/img-memory.jpg" alt="五年級議題課記憶空間">
            <figcaption>議題課程：記憶空間</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="assets/IMG_6162-compressed.jpeg" alt="五年級學生進行幾何圖形課程活動">
            <figcaption>幾何圖形操作與課堂討論</figcaption>
          </figure>
        </div>
      </div>

    </section>

    <section class="section">
      <div class="section-head">
        <p class="eyebrow">師生互動</p>
        <h2>師生互動</h2>
      </div>
      <div class="photo-grid">
        <figure class="photo-card large">
          <img src="assets/img-mentor.jpg" alt="教師與學生討論畢業製作內容">
          <figcaption>師生在畢業製作歷程中一起整理構想與創作方向。</figcaption>
        </figure>
      </div>
    </section>

    <section class="section soft">
      <div class="section-head">
        <p class="eyebrow">畢業成果展</p>
        <h2>邀請卡</h2>
      </div>
      <div class="photo-grid">
        <figure class="photo-card large diagram-card">
          <img class="diagram-image" src="assets/invite-card.jpg" alt="青溪國小創造力資優班第九屆畢業成果展邀請卡">
          <figcaption>青溪國小創造力資優班第九屆畢業成果展邀請卡。</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div>
      <p class="footer-title">活動剪影</p>
      <p>以學習歷程、作品展示與發表紀錄，完整呈現青溪資優班的成長軌跡。</p>
    </div>
  </footer>
  <script src="assets/random-images.js"></script>
</body>
</html>
